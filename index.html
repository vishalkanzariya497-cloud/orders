<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahakali Mitti Cool</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;}

.navbar{
background:#6b3e26;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.navbar a{color:white;text-decoration:none;margin:0 10px;}

.hero{
background:url('https://picsum.photos/1600/700?grayscale');
height:350px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.btn{
padding:10px 20px;
background:orange;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.products{text-align:center;padding:30px;}
.product-box{
display:inline-block;
width:200px;
margin:10px;
padding:15px;
background:rgba(255,255,255,0.1);
border-radius:10px;
}

.container{max-width:900px;margin:auto;padding:20px;}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

.card{
background:rgba(255,255,255,0.1);
padding:10px;
margin:8px 0;
border-radius:10px;
}

#adminPanel{display:none;background:#222;padding:15px;margin-top:20px;border-radius:10px;}

#loginBox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.loginInner{
background:#333;
padding:20px;
border-radius:10px;
width:300px;
}

.map iframe{
width:100%;
height:300px;
border:0;
margin-top:20px;
border-radius:10px;
}

.footer{
background:#6b3e26;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<div class="navbar">
<b>Mahakali Mitti Cool</b>
<div>
<a href="#products">Products</a>
<a href="#order">Order</a>
</div>
</div>

<div class="hero">
<h1>Natural Cooling with Clay 🏺</h1>
<p>Best Quality Mitti Products</p>
<button class="btn" onclick="document.getElementById('order').scrollIntoView()">Order Now</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">
<h2>Our Products</h2>

<div class="product-box">Matki<br>₹100</div>
<div class="product-box">Rajvadi<br>₹150</div>
<div class="product-box">Jodhapuri<br>₹150</div>
<div class="product-box">Balaji<br>₹150</div>
<div class="product-box">Perver<br>₹200</div>

</div>

<!-- ORDER -->
<div class="container" id="order">

<h2>Place Order 🛒</h2>

<input type="text" id="name" placeholder="Name">
<input type="tel" id="phone" placeholder="Phone">
<input type="text" id="address" placeholder="Address">

<select id="product">
<option value="Matki" data-price="100">Matki - ₹100</option>
<option value="Rajvadi" data-price="150">Rajvadi - ₹150</option>
<option value="Jodhapuri" data-price="150">Jodhapuri - ₹150</option>
<option value="Perver" data-price="200">Perver - ₹200</option>
</select>

<input type="number" id="qty" value="1">

<button class="btn" onclick="addCart()">Add to Cart</button>

<div id="cart"></div>
<h3 id="total">Total: ₹0</h3>

<button class="btn" onclick="sendWhatsApp()">Order on WhatsApp</button>
<button class="btn" onclick="openLogin()" style="background:#555;">Admin Panel</button>

<!-- MAP -->
<h3>📍 Our Location</h3>
<div class="map">
<iframe src="https://www.google.com/maps?q=22.574444,71.18625&output=embed"></iframe>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>📊 Order History</h3>
<div id="orders"></div>
</div>

</div>

<!-- LOGIN -->
<div id="loginBox">
<div class="loginInner">
<h3>Admin Login</h3>
<input type="password" id="adminPass" placeholder="Password">
<button class="btn" onclick="checkLogin()">Login</button>
<button class="btn" style="background:red;" onclick="closeLogin()">Close</button>
</div>
</div>

<div class="footer">
© 2026 Mahakali Mitti Cool
</div>

<script>

const ADMIN_PASSWORD = "1234";
const WHATSAPP_NUMBER = "919328041499";

let cart = [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function addCart(){
let p = document.getElementById("product");
let name = p.value;
let price = parseInt(p.options[p.selectedIndex].dataset.price);
let qty = parseInt(document.getElementById("qty").value);

cart.push({name,qty,total:price*qty});
render();
}

function render(){
let c = document.getElementById("cart");
let t = 0;
c.innerHTML = "";

cart.forEach(i=>{
t += i.total;
c.innerHTML += `<div class='card'>${i.name} x ${i.qty} = ₹${i.total}</div>`;
});

document.getElementById("total").innerText = "Total: ₹" + t;
}

function sendWhatsApp(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

if(!name || !phone || !address || cart.length==0){
alert("Fill all fields");
return;
}

let msg = `*New Order*%0A`;
msg += `Name: ${name}%0APhone: ${phone}%0AAddress: ${address}%0A%0AItems:%0A`;

let total = 0;

cart.forEach(i=>{
msg += `${i.name} x ${i.qty} = ₹${i.total}%0A`;
total += i.total;
});

msg += `%0ATotal: ₹${total}`;

orders.unshift({name,phone,address,cart,total,date:new Date().toLocaleString()});
localStorage.setItem("orders",JSON.stringify(orders));

window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,"_blank");

cart = [];
render();
loadOrders();
}

function openLogin(){
document.getElementById("loginBox").style.display="flex";
}

function closeLogin(){
document.getElementById("loginBox").style.display="none";
}

function checkLogin(){
let pass = document.getElementById("adminPass").value;

if(pass === ADMIN_PASSWORD){
document.getElementById("adminPanel").style.display="block";
closeLogin();
loadOrders();
}else{
alert("Wrong Password");
}
}

function loadOrders(){
let o = document.getElementById("orders");
o.innerHTML = "";

orders.forEach(x=>{
o.innerHTML += `
<div class='card'>
<b>${x.name}</b><br>
${x.phone}<br>
${x.address}<br>
Total: ₹${x.total}<br>
<small>${x.date}</small>
</div>`;
});
}

</script>

</body>
</html>
