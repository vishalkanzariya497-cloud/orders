<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahakali Mitti Cool | Official Store</title>

<style>
body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; scroll-behavior: smooth; }

.navbar {
    background: #6b3e26;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
}
.navbar b { font-size: 22px; }
.navbar a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }

.hero {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1590076215667-875d4ef2d9de?auto=format&fit=crop&q=80&w=1600');
    background-size: cover;
    height: 350px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
.hero h1 { color: #ff9800; }

.products { padding: 50px 20px; text-align: center; }
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}
.product-box {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
}
.product-box img {
    width: 100%;
    height: 320px;
    object-fit: contain;
    background: white;
    border-radius: 15px;
}

.container { max-width: 800px; margin: auto; padding: 40px 20px; }
input, select {
    width: 100%; padding: 14px; margin: 10px 0;
    border-radius: 10px;
}

.btn {
    padding: 15px;
    background: #ff9800;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.footer {
    background: #6b3e26;
    text-align: center;
    padding: 30px;
}
</style>
</head>

<body>

<div class="navbar">
    <b>🏺 Mahakali Mitti Cool</b>
    <div>
        <a href="#products">Products</a>
        <a href="#order">Order</a>
    </div>
</div>

<div class="hero">
    <h1>Natural Cooling with Clay 🏺</h1>
    <p>Pure Clay Pots – Health & Tradition Together</p>
</div>

<div class="products" id="products">
    <h2>Our Collection</h2>
    <div class="product-grid">
        <div class="product-box">
            <img src="matki.jpg">
            <b>Matki</b>
            <p>Price: ₹100</p>
        </div>
        <div class="product-box">
            <img src="rajvadi.jpg">
            <b>Rajvadi</b>
            <p>Price: ₹150</p>
        </div>
        <div class="product-box">
            <img src="jodhapuri.jpg">
            <b>Jodhapuri</b>
            <p>Price: ₹150</p>
        </div>
        <div class="product-box">
            <img src="perver.jpg">
            <b>Perver</b>
            <p>Price: ₹200</p>
        </div>
    </div>
</div>

<div class="container" id="order">
    <h2 style="text-align: center;">Order Form 🛒</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="tel" id="phone" placeholder="Mobile Number">
    <input type="text" id="address" placeholder="Full Address">

    <label>Select Product:</label>
    <select id="product">
        <option value="Matki" data-price="100">Matki - ₹100</option>
        <option value="Rajvadi" data-price="150">Rajvadi - ₹150</option>
        <option value="Jodhapuri" data-price="150">Jodhapuri - ₹150</option>
        <option value="Perver" data-price="200">Perver - ₹200</option>
    </select>

    <label>Quantity:</label>
    <input type="number" id="qty" value="1" min="1">

    <button class="btn" onclick="addCart()">Add to Cart</button>

    <div id="cart"></div>
    <h3 id="total">Total: ₹0</h3>

    <button class="btn" style="background: #25D366;" onclick="sendWhatsApp()">Send Order on WhatsApp</button>

    <button class="btn" onclick="openLogin()" style="background:#555;">Admin Panel</button>

    <div id="adminPanel" style="display:none;">
        <h3>Order History</h3>
        <div id="orders"></div>
    </div>
</div>

<div class="footer">
    <p><b>Mahakali Mitti Cool</b></p>
    <p>© 2026 - Gujarat</p>
</div>

<script>
const ADMIN_PASSWORD = "1234";
const WHATSAPP_NUMBER = "919328041499";

let cart = [];
let orders = JSON.parse(localStorage.getItem("mitti_orders")) || [];

function addCart(){
    const p = document.getElementById("product");
    const name = p.value;
    const price = parseInt(p.options[p.selectedIndex].dataset.price);
    const qty = parseInt(document.getElementById("qty").value);

    const existing = cart.find(item => item.name === name);
    if(existing){
        existing.qty += qty;
        existing.total = existing.qty * price;
    } else {
        cart.push({name, qty, price, total: price * qty});
    }
    render();
}

function render(){
    const c = document.getElementById("cart");
    let t = 0;
    c.innerHTML = "";
    cart.forEach((i)=>{
        t += i.total;
        c.innerHTML += `<div class='card'>${i.name} (x${i.qty}) = ₹${i.total}</div>`;
    });
    document.getElementById("total").innerText = "Total: ₹" + t;
}

function sendWhatsApp(){
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;

    let msg = `New Order - Mahakali Mitti Cool%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0A`;
    let total = 0;

    cart.forEach(i=>{
        msg += `${i.name} x${i.qty} = ₹${i.total}%0A`;
        total += i.total;
    });

    msg += `Total: ₹${total}`;

    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, "_blank");
}
</script>

</body>
</html>
