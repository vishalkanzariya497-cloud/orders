<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahakali Mitti Cool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f0f0f;color:white;}

.navbar{display:flex;justify-content:space-between;padding:15px 30px;background:#1a1a1a;}
.navbar a{color:white;text-decoration:none;margin-left:15px;}

.hero{
  height:70vh;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1590076215667-875d4ef2d9de');
  background-size:cover;
  display:flex;justify-content:center;align-items:center;flex-direction:column;
}
.hero h1{color:#ff9800;}

.products{padding:40px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#222;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:200px;object-fit:cover;background:white;}

.btn{background:#ff9800;border:none;padding:10px;color:white;width:100%;cursor:pointer;}

.cart,.order{padding:30px;max-width:600px;margin:auto;}
.item{background:#333;margin:10px 0;padding:10px;display:flex;justify-content:space-between;}

input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;}

.location{text-align:center;padding:40px;}
.location iframe{width:100%;height:250px;border:none;border-radius:10px;}

.whatsapp{
 position:fixed;bottom:20px;right:20px;background:#25D366;
 padding:15px;border-radius:50%;font-size:25px;color:white;
}

#adminLogin{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;}
#dashboard{display:none;padding:30px;}

.footer{text-align:center;padding:20px;background:#1a1a1a;}
</style>
</head>

<body>

<div class="navbar">
<b>Mahakali Mitti Cool</b>
<div>
<a href="#products">Products</a>
<a href="#order">Order</a>
</div>
</div>

<div class="hero">
<h1>Natural Clay Pots</h1>
</div>

<div class="products" id="products">
<h2>Products</h2>
<div class="grid">

<div class="card">
<img src="matki.jpg">
<h3>Matki ₹100</h3>
<button class="btn" onclick="add('Matki',100)">Add</button>
</div>

<div class="card">
<img src="rajvadi.jpg">
<h3>Rajvadi ₹150</h3>
<button class="btn" onclick="add('Rajvadi',150)">Add</button>
</div>

<div class="card">
<img src="jodhapuri.jpg">
<h3>Jodhapuri ₹150</h3>
<button class="btn" onclick="add('Jodhapuri',150)">Add</button>
</div>

<div class="card">
<img src="perver.jpg">
<h3>Perver ₹200</h3>
<button class="btn" onclick="add('Perver',200)">Add</button>
</div>

</div>
</div>

<div class="cart">
<h2>Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
</div>

<div class="order" id="order">
<h2>Details</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button class="btn" onclick="order()">Order on WhatsApp</button>
<button class="btn" onclick="openAdmin()">Admin</button>
</div>

<div class="location">
<h2>Location</h2>
<iframe src="https://www.google.com/maps?q=22.574444,71.186250&output=embed"></iframe>
</div>

<a href="https://wa.me/919328041499" class="whatsapp">💬</a>

<div class="footer">© 2026</div>

<!-- ADMIN -->
<div id="adminLogin">
<div style="background:#222;padding:20px;">
<input id="adminPass" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<div id="dashboard">
<h2>Dashboard</h2>
<h3 id="sales">Total ₹0</h3>
<div id="orders"></div>
</div>

<script>
let cart=[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];

function add(n,p){
 let f=cart.find(i=>i.name==n);
 if(f){f.qty++;f.total=f.qty*p}
 else{cart.push({name:n,price:p,qty:1,total:p})}
 render();
}

function render(){
 let c=document.getElementById("cart"),t=0;
 c.innerHTML="";
 cart.forEach(i=>{
  t+=i.total;
  c.innerHTML+=`<div class="item">${i.name} x${i.qty} ₹${i.total}</div>`;
 });
 document.getElementById("total").innerText="Total ₹"+t;
}

function order(){
 let name=name.value,phone=phone.value,address=address.value;
 if(!name||!phone||!address||cart.length==0)return alert("Fill details");

 let msg="Order%0A";
 let total=0;
 cart.forEach(i=>{
  msg+=`${i.name} x${i.qty} ₹${i.total}%0A`;
  total+=i.total;
 });

 orders.push({name,phone,address,total});
 localStorage.setItem("orders",JSON.stringify(orders));

 window.open("https://wa.me/919328041499?text="+msg);
}

function openAdmin(){
 document.getElementById("adminLogin").style.display="flex";
}

function login(){
 if(adminPass.value=="admin123"){
  adminLogin.style.display="none";
  dashboard.style.display="block";
  load();
 }
}

function load(){
 let o=document.getElementById("orders"),t=0;
 o.innerHTML="";
 orders.forEach((i,x)=>{
  t+=i.total;
  o.innerHTML+=`<div class="item">${i.name} ₹${i.total}
  <button onclick="del(${x})">❌</button></div>`;
 });
 document.getElementById("sales").innerText="Total ₹"+t;
}

function del(i){
 orders.splice(i,1);
 localStorage.setItem("orders",JSON.stringify(orders));
 load();
}
</script>

</body>
</html>
